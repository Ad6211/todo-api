<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/10647/10647890.png">
</head>
<body>
    <div class="container">
        <h1>📋 Todo List</h1>

        <div class="stats" id="stats">
            <span>Total : <strong id="totalCount">0</strong></span>
            <span>✅ Faites : <strong id="doneCount">0</strong></span>
            <span>⏳ En cours : <strong id="pendingCount">0</strong></span>
            <span id="filterCount" class="filter-count">Filtre : <strong id="shownCount">0</strong></span>
        </div>

        <div class="add-form">
            <input type="text" id="newTodoInput" placeholder="Nouvelle tache..." autocomplete="off">
            <button id="addBtn">Ajouter</button>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Rechercher par titre..." autocomplete="off">
        </div>

        <div class="filters">
            <button class="active" data-filter="all">Toutes</button>
            <button data-filter="pending">En cours</button>
            <button data-filter="completed">Faites</button>
        </div>

        <div id="content">
            <div class="loading" id="loading">
                <div class="loader"></div>
                Chargement des tâches...
            </div>
        </div>
    </div>

    <!-- L'ordre des scripts est important : chaque fichier dépend du précédent -->
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/todoManager.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
